<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tas Transit - Live</title>

    <!-- Set the theme before first paint to avoid a flash of the wrong colors. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("tas-transit-theme");
          if (t !== "light" && t !== "dark") {
            t = window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
          }
          document.documentElement.setAttribute("data-theme", t);
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      })();
    </script>

    <!-- Leaflet from CDN -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>

    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <div id="app">
      <button id="sidebar-toggle" class="sidebar-toggle" aria-label="Open menu">
        <span class="sidebar-toggle__icon"></span>
      </button>
      <div id="sidebar-backdrop" class="sidebar-backdrop" hidden></div>

      <aside id="sidebar" class="sidebar">
        <header class="sidebar__header">
          <h1 class="sidebar__title">Tas Transit</h1>
          <div class="sidebar__status">
            <span id="conn-dot" class="conn-dot conn-dot--off"></span>
            <span id="conn-label" class="conn-label">Connecting...</span>
            <button
              id="theme-toggle"
              class="theme-toggle"
              type="button"
              aria-label="Toggle light and dark theme"
              title="Toggle theme"
            >
              <svg class="theme-toggle__sun" viewBox="0 0 24 24" width="16" height="16" aria-hidden="true">
                <circle cx="12" cy="12" r="4.2" />
                <path
                  d="M12 2.5v2.6M12 18.9v2.6M2.5 12h2.6M18.9 12h2.6M5 5l1.8 1.8M17.2 17.2L19 19M19 5l-1.8 1.8M6.8 17.2L5 19"
                />
              </svg>
              <svg class="theme-toggle__moon" viewBox="0 0 24 24" width="16" height="16" aria-hidden="true">
                <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z" />
              </svg>
            </button>
          </div>
          <button id="sidebar-close" class="sidebar__close" aria-label="Close menu">&times;</button>
        </header>

        <nav class="tabs" role="tablist">
          <button class="tab tab--active" data-tab="routes" role="tab">Routes</button>
          <button class="tab" data-tab="stops" role="tab">Stops</button>
        </nav>

        <div class="sidebar__search">
          <input id="search-input" type="search" placeholder="Filter..." autocomplete="off" />
        </div>

        <div id="panel-routes" class="panel panel--active">
          <ul id="route-list" class="list"></ul>
        </div>
        <div id="panel-stops" class="panel">
          <ul id="stop-list" class="list"></ul>
        </div>

        <footer class="sidebar__footer">
          <span id="vehicle-count">0 vehicles</span>
          <button id="clear-selection" class="link-btn" hidden>Clear selection</button>
        </footer>
      </aside>

      <main id="map" class="map">
        <aside id="vehicle-panel" class="vpanel" hidden></aside>
        <aside id="stop-panel" class="vpanel" hidden></aside>
      </main>
    </div>

    <script type="module" src="./js/main.js"></script>
  </body>
</html>
